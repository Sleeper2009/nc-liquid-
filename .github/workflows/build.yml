name: Build LiquidGlassNC

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Theos
        uses: theos/actions/install@master
        with:
          version: latest

      - name: Install iOS SDK
        uses: theos/actions/sdk@master
        with:
          version: "16.5"

      - name: Build package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiquidGlassNC-deb
          path: packages/*.deb
